name: Bot Comparador Diario

on:
  schedule:
    - cron: '0 12 * * *' # Roda todos os dias às 09:00 (Horário de Brasília)
  workflow_dispatch: # Permite rodar manualmente para testar

jobs:
  rodar-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar codigo
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install pandas gspread oauth2client google-generativeai playwright
          playwright install chromium

      - name: Criar arquivo de credenciais
        run: echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > credenciais.json

      - name: Executar Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python comparador.py
